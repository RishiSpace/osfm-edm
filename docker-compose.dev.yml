version: "3.8"

# Development override — runs only the database, server and dashboard run locally.
services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: osfm_edm
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: osfm_edm
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osfm_edm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
